services:
  db:
    image: postgres:16
    container_name: todo-app-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: todo-db
    ports:
      - "5432:5432"
    volumes:
      - data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "user", "-d", "todo-db"]
      interval: 3s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./todo-app-backend
    container_name: todo-app-backend
    environment:
      DB_HOST: db
      DB_USER: user
      DB_PASSWORD: password
      DB_NAME: todo-db
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./todo-app-frontend
    container_name: todo-app-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  data: